name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install linting tools
        run: pip install flake8 black isort
      
      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=__pycache__,node_modules,.git --count --show-source --statistics
      
      - name: Check formatting with black
        run: black --check --line-length=120 . || true
  
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run import tests
        run: |
          python -c "from utils.attention import SEBlock, CBAMBlock; print('Attention OK')"
          python -c "from utils.ensemble import build_single_model; print('Ensemble OK')"
          python -c "from utils.uncertainty import MCDropout; print('Uncertainty OK')"
          python -c "from utils.xai_methods import IntegratedGradients; print('XAI OK')"
          python -c "from utils.nlp_reports import generate_report; print('NLP OK')"
          python -c "from utils.multilingual import get_text; print('Multilingual OK')"
          python -c "from utils.compliance import AuditLogger; print('Compliance OK')"
          python -c "from utils.batch_processor import process_batch; print('Batch OK')"
          python -c "from database import Database; print('Database OK')"
          python -c "from auth import UserManager; print('Auth OK')"
      
      - name: Run model build test
        run: |
          python -c "
          from train import build_model
          import torch
          model = build_model(num_classes=2, pretrained=False, architecture='densenet121')
          x = torch.randn(1, 3, 224, 224)
          out = model(x)
          assert out.shape == (1, 2), f'Expected (1,2), got {out.shape}'
          print('Model build test passed')
          "
      
      - name: Run database test
        run: |
          python -c "
          from database import Database
          import os
          db = Database('test_db.db')
          db.add_patient('TEST001', name='Test', age=30)
          patient = db.get_patient('TEST001')
          assert patient is not None
          db.add_prediction('test.jpg', 1, 'Pneumonia', 0.95, patient_id='TEST001')
          history = db.get_patient_history('TEST001')
          assert len(history) == 1
          db.close()
          os.remove('test_db.db')
          print('Database test passed')
          "
      
      - name: Run auth test
        run: |
          python -c "
          from auth import UserManager, create_access_token, verify_token
          import os
          manager = UserManager('test_users.json')
          manager.create_user('test', 'pass123', 'admin')
          user = manager.authenticate('test', 'pass123')
          assert user is not None
          token = create_access_token({'sub': 'test', 'role': 'admin'})
          decoded = verify_token(token)
          assert decoded['sub'] == 'test'
          os.remove('test_users.json')
          print('Auth test passed')
          "

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t xray-pneumonia:latest .
      
      - name: Test Docker image
        run: |
          docker run --rm xray-pneumonia:latest python -c "
          import torch
          from train import build_model
          print('Docker image working correctly')
          "
