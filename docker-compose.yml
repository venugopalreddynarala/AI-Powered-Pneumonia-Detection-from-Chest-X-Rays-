version: '3.8'

services:
  # Streamlit web application
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
      - ./logs:/app/logs
    environment:
      - XRAY_SECRET_KEY=${XRAY_SECRET_KEY:-change-this-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI REST API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-api
    command: ["python", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
      - ./logs:/app/logs
    environment:
      - XRAY_SECRET_KEY=${XRAY_SECRET_KEY:-change-this-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
  models:
  results:
  logs:
